<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flappy Bird</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="OpenEyes.png">
  <style>
    body {
      font-family: 'Press Start 2P', monospace;
      margin: 0;
      overflow: hidden;
      background: #000 url("BackGround.jpg") no-repeat center center fixed;
      background-size: cover;
      text-align: center;
    }

    .tabs {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 10;
      padding: 10px;
    }

    .tabs button {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      margin: 0 10px;
      padding: 5px 10px;
      background: cyan;
      border: 2px solid black;
      border-radius: 10px;
      cursor: pointer;
    }

    .tabs button.active {
      background: gold;
    }

    #board {
      display: block;
      margin: 60px auto 0 auto;
      background: url("flappybirdbg.png") no-repeat center/cover;
      position: relative;
      z-index: 1;
      max-width: 100%;
      height: auto;
      border-radius: 20px;
      border: 10px solid cyan;
    }

    #pauseBtn {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      padding: 5px 20px;
      background: cyan;
      border: 2px solid black;
      font-family: 'Press Start 2P', monospace;
      border-radius: 10px;
      cursor: pointer;
      z-index: 2;
    }
    #scoreboard {
      display: none;
      color: white;
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.85);
      border: 4px solid cyan;
      border-radius: 10px;
      width: 320px;
      margin: 80px auto 0;
      line-height: 1.6;
    }

    #gameOverModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
    }

    .popup {
      display: inline-block;
      background-color: #f5deb3;
      border: 2px solid #000000;
      padding: 12px 24px;
      box-shadow: 0 2px #333;
      margin-bottom: 20px;
    }

    .score-label {
      color: #ff6347;
      font-size: 8px;
      margin-top: 4px;
      margin-bottom: 2px;
    }

    .score-value {
      color: #000000;
      font-size: 28px;
      line-height: 28px;
      margin-bottom: 4px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .pixel-btn {
      background-color: #b55220;
      border: 2px solid #ffffff;
      color: white;
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      padding: 10px 14px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #000;
      text-shadow: 1px 1px 0 #000;
      width: 240px;
    }

    .pixel-btn:hover {
      filter: brightness(1.1);
    }

    #gameOverModal.show {
      display: block;
    }

    #countdown {
      font-size: 96px;
      font-weight: bold;
      color: white;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 100;
      pointer-events: none;
      animation: scaleFade 1s ease forwards;
    }

    @keyframes scaleFade {
      0% { transform: translate(-50%, -50%) scale(2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="authContainer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;">
    <h2 id="authTitle" style="margin-bottom: 20px; font-size: 18px;">FLAPPY BIRD</h2>
    <input type="text" id="usernameInput" placeholder="USERNAME" style="padding: 12px; margin-bottom: 10px; font-family: 'Press Start 2P'; font-size: 10px; width: 260px; border: 4px solid cyan; background: #000; color: white; outline: none;">
    <input type="password" id="passwordInput" placeholder="PASSWORD" style="padding: 12px; margin-bottom: 20px; font-family: 'Press Start 2P'; font-size: 10px; width: 260px; border: 4px solid cyan; background: #000; color: white; outline: none;">
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <button class="pixel-btn" onclick="handleAuth('login')">LOGIN</button>
      <button class="pixel-btn" style="background: #444;" onclick="handleAuth('register')">REGISTER</button>
    </div>
  </div>

  <div class="tabs">
    <button id="gameTab" class="active">Game</button>
    <button id="scoreboardTab">Scoreboard</button>
    <span id="userDisplay" style="color: gold; font-size: 8px; margin-left: 5px;"></span>
  </div>

  <canvas id="board"></canvas>

  <div id="gameContainer">
    <button id="pauseBtn">Pause</button>
  </div>

  <div id="scoreboard"></div>

  <div id="gameOverModal">
    <div class="popup">
      <div class="score-label">SCORE</div>
      <div class="score-value" id="finalScore">0</div>
      <div class="score-label">BEST</div>
      <div class="score-value" id="highScore">0</div>
    </div>
    <div class="buttons">
      <button class="pixel-btn" onclick="restartGame()">RESTART</button>
      <button class="pixel-btn" onclick="shareScore()">SHARE</button>
      <button class="pixel-btn" onclick="addToScoreboard()">ADD TO LEADERBOARD</button>
    </div>
  </div>

  <div id="countdown"></div>

  <audio id="bgm" loop src="bgm_mario.mp3"></audio>
  <audio id="sfx_wing" src="sfx_wing.wav"></audio>
  <audio id="sfx_hit" src="sfx_hit.wav"></audio>
  <audio id="sfx_point" src="sfx_point.wav"></audio>
  <audio id="sfx_swooshing" src="sfx_swooshing.wav"></audio>
  <audio id="sfx_die" src="sfx_die.wav"></audio>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBAZs4Lwd-IgdV9y0d41PXMHyW1mll_PVY",
      authDomain: "flappybirdleaderboard-186ad.firebaseapp.com",
      projectId: "flappybirdleaderboard-186ad",
      storageBucket: "flappybirdleaderboard-186ad.firebasestorage.app",
      messagingSenderId: "623790359391",
      appId: "1:623790359391:web:f62feff43af41642a72cea",
      measurementId: "G-TJR0EHQLQN"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <script>
    // Game Variables
    let waitingForStart = true;
    let board, context;
    const boardWidth = 360, boardHeight = 640;
    const birdWidth = 34, birdHeight = 24;
    const birdX = boardWidth / 8, birdY = boardHeight / 2;
    let birdImg = new Image(), birdBlinkImg = new Image();
    let bird = { x: birdX, y: birdY, width: birdWidth, height: birdHeight };
    let pipeArray = [], pipeWidth = 64, pipeHeight = 512, pipeX = boardWidth;
    let topPipeImg = new Image(), bottomPipeImg = new Image();
    let velocityX = 0, velocityY = 0, gravity = 0.4;
    let gameOver = false, score = 0, paused = false;
    let highScore = 0, currentUser = null, isBlinking = false;
    let bgm, sfxWing, sfxHit, sfxPoint, sfxSwooshing, sfxDie;

    // AUTH LOGIC
    async function handleAuth(type) {
      const u = document.getElementById("usernameInput").value.trim().toLowerCase();
      const p = document.getElementById("passwordInput").value.trim();
      if (!u || !p) return alert("Enter Username and Password!");

      const userRef = db.collection("users").doc(u);
      const doc = await userRef.get();

      if (type === 'register') {
        if (doc.exists) return alert("Username already taken!");
        await userRef.set({ username: u, password: p, highScore: 0 });
        alert("Account Created! You can now Login.");
      } else {
        if (!doc.exists || doc.data().password !== p) return alert("Invalid Login Details!");
        currentUser = u;
        highScore = doc.data().highScore || 0;
        document.getElementById("userDisplay").textContent = "HI " + u.toUpperCase();
        document.getElementById("authContainer").style.display = "none";
      }
    }

    window.onload = () => {
      board = document.getElementById("board");
      board.width = boardWidth; board.height = boardHeight;
      context = board.getContext("2d");
      birdImg.src = "OpenEyes.png"; birdBlinkImg.src = "ClosedEyes.png";
      topPipeImg.src = "toppipe.png"; bottomPipeImg.src = "bottompipe.png";
      bgm = document.getElementById("bgm");
      sfxWing = document.getElementById("sfx_wing"); sfxHit = document.getElementById("sfx_hit");
      sfxPoint = document.getElementById("sfx_point"); sfxSwooshing = document.getElementById("sfx_swooshing");
      sfxDie = document.getElementById("sfx_die");
      
      document.getElementById("pauseBtn").onclick = togglePause;
      document.getElementById("gameTab").onclick = () => switchTab("game");
      document.getElementById("scoreboardTab").onclick = () => switchTab("scoreboard");
      document.addEventListener("keydown", moveBird);
      document.addEventListener("touchstart", moveBird);

      requestAnimationFrame(update);
      setInterval(placePipes, 1500);
    };

    function update() {
      requestAnimationFrame(update);
      if (gameOver || paused || !currentUser) return;
      context.clearRect(0, 0, board.width, board.height);
      
      isBlinking = (Date.now() % 4000) < 200;
      if (!waitingForStart) {
        velocityY += gravity;
        bird.y = Math.min(Math.max(bird.y + velocityY, 0), board.height - bird.height);
        velocityX = -2;
      } else {
        bird.y = birdY + 10 * Math.sin(Date.now() * 0.005);
      }

      context.drawImage(isBlinking ? birdBlinkImg : birdImg, bird.x, bird.y, bird.width, bird.height);
      if (!waitingForStart && bird.y + bird.height >= board.height) return handleGameOver();

      for (let pipe of pipeArray) {
        if (!waitingForStart) pipe.x += velocityX;
        context.drawImage(pipe.img, pipe.x, pipe.y, pipe.width, pipe.height);
        if (!pipe.passed && bird.x > pipe.x + pipe.width) {
          score += 0.5; pipe.passed = true; sfxPoint.play();
        }
        if (detectCollision(bird, pipe)) return handleGameOver();
      }
      pipeArray = pipeArray.filter(p => p.x > -pipeWidth);
      context.fillStyle = "white"; context.font = "55px 'Press Start 2P'";
      context.fillText(Math.floor(score), board.width/2 - 25, board.height/4);
    }

    async function addToScoreboard() {
      if (!currentUser) return;
      const finalScore = Math.floor(score);
      const userRef = db.collection("users").doc(currentUser);
      const scoreRef = db.collection("scores").doc(currentUser);

      try {
        if (finalScore > highScore) {
          await userRef.update({ highScore: finalScore });
          await scoreRef.set({ name: currentUser, score: finalScore, timestamp: Date.now() });
          highScore = finalScore;
          alert("New Personal Record! 🔥");
        } else {
          alert(`Current Personal Best is ${highScore}.`);
        }
        switchTab("scoreboard");
      } catch (err) { console.error(err); }
    }

    async function showScoreboard() {
      const sb = document.getElementById("scoreboard");
      sb.style.display = "block"; sb.innerHTML = "Loading...";
      try {
        const snap = await db.collection("scores").orderBy("score", "desc").limit(10).get();
        let html = "<h3>🏆 TOP 10</h3>";
        let rank = 1;
        snap.forEach(doc => {
          html += `<p style="font-size:10px; text-align:left;">${rank++}. ${doc.data().name}: ${doc.data().score}</p>`;
        });
        sb.innerHTML = html || "<h3>🏆 TOP 10</h3><p>No scores yet</p>";
      } catch (err) { sb.innerHTML = "Error loading."; }
    }

    function placePipes() {
      if (gameOver || paused || waitingForStart) return;
      let randomY = -pipeHeight/4 - Math.random() * (pipeHeight/2);
      pipeArray.push({ img: topPipeImg, x: pipeX, y: randomY, width: pipeWidth, height: pipeHeight, passed: false });
      pipeArray.push({ img: bottomPipeImg, x: pipeX, y: randomY + pipeHeight + 160, width: pipeWidth, height: pipeHeight, passed: false });
    }

    function moveBird(e) {
      if (gameOver || paused || !currentUser) return;
      if (e.type === "keydown" && e.code !== "Space" && e.code !== "ArrowUp") return;
      if (waitingForStart) {
        waitingForStart = false; bgm.play(); sfxSwooshing.play();
      }
      velocityY = -6; sfxWing.currentTime = 0; sfxWing.play();
    }

    function detectCollision(a, b) {
      return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function handleGameOver() {
      if (gameOver) return;
      gameOver = true; sfxHit.play(); sfxDie.play(); bgm.pause();
      document.getElementById("finalScore").textContent = Math.floor(score);
      document.getElementById("highScore").textContent = Math.floor(highScore);
      document.getElementById("gameOverModal").classList.add("show");
    }

    function restartGame() {
      document.getElementById("gameOverModal").classList.remove("show");
      bird.y = birdY; velocityY = 0; pipeArray = []; score = 0;
      gameOver = false; waitingForStart = true;
    }

    function switchTab(tab) {
      document.getElementById("gameTab").classList.toggle("active", tab === "game");
      document.getElementById("scoreboardTab").classList.toggle("active", tab === "scoreboard");
      document.getElementById("board").style.display = (tab === "game") ? "block" : "none";
      document.getElementById("pauseBtn").style.display = (tab === "game") ? "block" : "none";
      document.getElementById("scoreboard").style.display = (tab === "scoreboard") ? "block" : "none";
      if (tab === "scoreboard") showScoreboard();
    }

    function togglePause() {
      if (gameOver || waitingForStart) return;
      paused = !paused;
      document.getElementById("pauseBtn").textContent = paused ? "Play" : "Pause";
    }

    function shareScore() {
      const text = `${currentUser} scored ${Math.floor(score)} in Flappy Bird!`;
      if (navigator.share) navigator.share({ title: "Score", text });
      else alert(text);
    }
  </script>
</body>
</html>
