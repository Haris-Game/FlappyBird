<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flappy Bird | Fixed Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Press Start 2P', monospace;
      margin: 0;
      overflow: hidden;
      background: #000 url("BackGround.jpg") no-repeat center center fixed;
      background-size: cover;
      text-align: center;
      color: white;
    }

    /* Auth Container */
    #authContainer {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(5px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: #111;
      padding: 40px;
      border: 4px solid cyan;
      border-radius: 20px;
      box-shadow: 0 0 20px cyan;
      width: 320px;
    }

    .auth-card input, .auth-card select {
      padding: 12px;
      margin-bottom: 15px;
      font-family: 'Press Start 2P';
      font-size: 10px;
      width: 100%;
      box-sizing: border-box;
      border: 2px solid #333;
      background: #000;
      color: white;
    }

    .pixel-btn {
      background-color: #b55220;
      border: 2px solid #ffffff;
      color: white;
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      padding: 12px;
      cursor: pointer;
      box-shadow: 3px 3px 0 #000;
      width: 100%;
    }

    .toggle-link {
      margin-top: 20px;
      font-size: 8px;
      cursor: pointer;
      color: #aaa;
      text-decoration: underline;
    }

    /* Game UI */
    #board {
      display: block;
      margin: 60px auto 0 auto;
      background: url("flappybirdbg.png") no-repeat center/cover;
      border: 10px solid cyan;
      border-radius: 20px;
    }

    #userDisplay {
      position: fixed;
      bottom: 10px;
      left: 20px;
      color: gold; 
      font-size: 10px; 
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px;
      border-radius: 10px;
      border: 2px solid cyan;
      display: none;
    }

    .tabs { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); z-index: 10; padding: 10px; display: flex; justify-content: center; }
    .tabs button { font-family: 'Press Start 2P'; font-size: 8px; margin: 0 5px; padding: 8px; cursor: pointer; background: cyan; }
    
    #customAlert {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      background: #222; border: 4px solid #ff6347; padding: 15px; color: white;
      font-size: 10px; z-index: 3000; transition: top 0.5s;
    }
    #customAlert.show { top: 20px; }
  </style>
</head>
<body>

  <div id="customAlert"><span id="alertMessage"></span></div>

  <div id="authContainer">
    <div class="auth-card">
      <h2 id="authTitle">FLAPPY LOGIN</h2>
      <input type="text" id="usernameInput" placeholder="USERNAME">
      <input type="password" id="passwordInput" placeholder="PASSWORD">
      <select id="genderInput" style="display: none;">
        <option value="male">MALE 👨</option>
        <option value="female">FEMALE 👩</option>
      </select>
      <button id="authPrimaryBtn" class="pixel-btn" onclick="processAuth()">LOGIN</button>
      <div id="authToggle" class="toggle-link" onclick="toggleAuthMode()">
        Don't have an account? Register
      </div>
    </div>
  </div>

  <div id="userDisplay"></div>

  <div class="tabs">
    <button onclick="location.reload()">Game</button>
    <button>Shop</button>
  </div>

  <canvas id="board"></canvas>

  <!-- Firebase Legacy SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    // 1. Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBAZs4Lwd-IgdV9y0d41PXMHyW1mll_PVY",
      authDomain: "flappybirdleaderboard-186ad.firebaseapp.com",
      projectId: "flappybirdleaderboard-186ad",
      storageBucket: "flappybirdleaderboard-186ad.firebasestorage.app",
      messagingSenderId: "623790359391",
      appId: "1:623790359391:web:f62feff43af41642a72cea"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. Global Variables
    let currentUser = null;
    let authMode = 'login';
    let board, context;
    const boardWidth = 360;
    const boardHeight = 640;

    // 3. Auth Functions
    function fancyAlert(msg) {
        const alertBox = document.getElementById("customAlert");
        document.getElementById("alertMessage").textContent = msg;
        alertBox.classList.add("show");
        setTimeout(() => alertBox.classList.remove("show"), 2000);
    }

    function toggleAuthMode() {
      const title = document.getElementById("authTitle");
      const btn = document.getElementById("authPrimaryBtn");
      const toggle = document.getElementById("authToggle");
      const genderInput = document.getElementById("genderInput");
      
      if (authMode === 'login') {
        authMode = 'register';
        title.textContent = "FLAPPY REGISTER";
        btn.textContent = "REGISTER";
        toggle.textContent = "Already have an account? Login";
        genderInput.style.display = "block";
      } else {
        authMode = 'login';
        title.textContent = "FLAPPY LOGIN";
        btn.textContent = "LOGIN";
        toggle.textContent = "Don't have an account? Register";
        genderInput.style.display = "none";
      }
    }

    async function processAuth() {
      const u = document.getElementById("usernameInput").value.trim().toLowerCase();
      const p = document.getElementById("passwordInput").value.trim();
      const g = document.getElementById("genderInput").value;
      
      if (!u || !p) { fancyAlert("FILL ALL FIELDS!"); return; }
      
      try {
        const userRef = db.collection("users").doc(u);
        const doc = await userRef.get();
        
        if (authMode === 'register') {
          if (doc.exists) { 
            fancyAlert("USERNAME TAKEN!"); 
          } else {
            await userRef.set({ 
                username: u, 
                password: p, 
                gender: g, 
                highScore: 0, 
                totalCoins: 0, 
                unlockedMaps: [0], 
                timestamp: Date.now() 
            });
            fancyAlert("REGISTERED! PLEASE LOGIN.");
            toggleAuthMode();
          }
        } else {
          // Login Logic
          if (!doc.exists) {
            fancyAlert("USER NOT FOUND!");
          } else if (doc.data().password !== p) {
            fancyAlert("WRONG PASSWORD!");
          } else {
            // SUCCESSFUL LOGIN
            currentUser = u;
            const userData = doc.data();
            
            // UI Transition
            document.getElementById("authContainer").style.display = "none";
            const displayElem = document.getElementById("userDisplay");
            displayElem.innerHTML = `<span>${userData.gender === 'female' ? "👩" : "👨"} ${u.toUpperCase()}</span>`;
            displayElem.style.display = "block";
            
            fancyAlert("LOGGED IN!");
            startGame(); // Trigger game initialization
          }
        }
      } catch (err) { 
        console.error(err);
        fancyAlert("FIREBASE ERROR!"); 
      }
    }

    // 4. Game Engine Initialization
    window.onload = function() {
      board = document.getElementById("board");
      board.width = boardWidth;
      board.height = boardHeight;
      context = board.getContext("2d");
    };

    function startGame() {
        // Your existing Flappy Bird game loop (requestAnimationFrame, etc.) would go here
        console.log("Game started for: " + currentUser);
        context.fillStyle = "white";
        context.fillText("WELCOME " + currentUser.toUpperCase(), 50, 100);
    }
  </script>
</body>
</html>
