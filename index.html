<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:'Press Start 2P', cursive;
}

.menu{
    position:relative;
    width:249px;
    height:442px;
    background:url("your-image.png") center/cover no-repeat;
    overflow:hidden;
}

/* Covers the original bird */
.cover{
    position:absolute;
    left:88px;
    top:120px;
    width:72px;
    height:110px;
    background:#6ec9df;
}

/* Buttons */
.buttons{
    position:absolute;
    top:135px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    width:170px;
}

.btn{
    text-decoration:none;
    text-align:center;
    color:#fff;
    background:#c96b28;
    border:3px solid #fff;
    box-shadow:4px 4px #5a2f0d;
    padding:12px 0;
    font-size:10px;
    transition:.15s;
}

.btn:hover{
    transform:translateY(2px);
    box-shadow:2px 2px #5a2f0d;
}

.btn:active{
    transform:translateY(4px);
    box-shadow:none;
}
</style>

</head>
<body>

<div class="menu">

    <div class="cover"></div>

    <div class="buttons">
        <a href="#" class="btn">PLAY</a>
        <a href="#" class="btn">LEADERBOARD</a>
        <a href="#" class="btn">OTHER GAMES</a>
    </div>

</div>

</body>
</html>
