<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flappy Bird</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="OpenEyes.png">
  <style>
    body {
      font-family: 'Press Start 2P', monospace;
      margin: 0;
      overflow: hidden;
      background: #000 url("BackGround.jpg") no-repeat center center fixed;
      background-size: cover;
      text-align: center;
    }

    .tabs {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 10;
      padding: 10px;
    }

    .tabs button {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      margin: 0 10px;
      padding: 5px 10px;
      background: cyan;
      border: 2px solid black;
      border-radius: 10px;
      cursor: pointer;
    }

    .tabs button.active {
      background: gold;
    }

    #board {
      display: block;
      margin: 60px auto 0 auto;
      background: url("flappybirdbg.png") no-repeat center/cover;
      position: relative;
      z-index: 1;
      max-width: 100%;
      height: auto;
      border-radius: 20px;
      border: 10px solid cyan;
    }

    #pauseContainer {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }

    #pauseBtn {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      padding: 5px 20px;
      background: cyan;
      border: 2px solid black;
      font-family: 'Press Start 2P', monospace;
      border-radius: 10px;
      cursor: pointer;
      z-index: 2;
    }
    #scoreboard {
      display: none;
      color: white;
      font-family: 'Press Start 2P', monospace; /* Changed to match theme */
      font-size: 14px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.85);
      border: 4px solid cyan;
      border-radius: 10px;
      width: 320px;
      margin: 80px auto 0;
      line-height: 1.6;
    }

    #gameOverModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
    }

    .popup {
      display: inline-block;
      background-color: #f5deb3;
      border: 2px solid #000000;
      padding: 12px 24px;
      box-shadow: 0 2px #333;
      margin-bottom: 20px;
    }

    .score-label {
      color: #ff6347;
      font-size: 8px;
      margin-top: 4px;
      margin-bottom: 2px;
    }

    .score-value {
      color: #000000;
      font-size: 28px;
      line-height: 28px;
      margin-bottom: 4px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .pixel-btn {
      background-color: #b55220;
      border: 2px solid #ffffff;
      color: white;
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      padding: 10px 14px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #000;
      text-shadow: 1px 1px 0 #000;
      width: 240px;
    }

    .pixel-btn:hover {
      filter: brightness(1.1);
    }

    #gameOverModal.show {
      display: block;
    }

    #countdown {
      font-size: 96px;
      font-weight: bold;
      color: white;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 100;
      pointer-events: none;
      animation: scaleFade 1s ease forwards;
    }

    @keyframes scaleFade {
      0% { transform: translate(-50%, -50%) scale(2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="tabs">
    <button id="gameTab" class="active">Game</button>
    <button id="scoreboardTab">Scoreboard</button>
  </div>

  <canvas id="board"></canvas>

  <div id="gameContainer">
    <button id="pauseBtn">Pause</button>
  </div>

  <div id="scoreboard"></div>

  <div id="gameOverModal">
    <div class="popup">
      <div class="score-label">SCORE</div>
      <div class="score-value" id="finalScore">0</div>
      <div class="score-label">BEST</div>
      <div class="score-value" id="highScore">0</div>
    </div>
    <div class="buttons">
      <button class="pixel-btn" onclick="restartGame()">RESTART</button>
      <button class="pixel-btn" onclick="shareScore()">SHARE</button>
      <button class="pixel-btn" onclick="addToScoreboard()">ADD TO LEADERBOARD</button>
    </div>
  </div>

  <div id="countdown"></div>

  <audio id="bgm" loop src="bgm_mario.mp3"></audio>
  <audio id="sfx_wing" src="sfx_wing.wav"></audio>
  <audio id="sfx_hit" src="sfx_hit.wav"></audio>
  <audio id="sfx_point" src="sfx_point.wav"></audio>
  <audio id="sfx_swooshing" src="sfx_swooshing.wav"></audio>
  <audio id="sfx_die" src="sfx_die.wav"></audio>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBAZs4Lwd-IgdV9y0d41PXMHyW1mll_PVY",
      authDomain: "flappybirdleaderboard-186ad.firebaseapp.com",
      projectId: "flappybirdleaderboard-186ad",
      storageBucket: "flappybirdleaderboard-186ad.firebasestorage.app",
      messagingSenderId: "623790359391",
      appId: "1:623790359391:web:f62feff43af41642a72cea",
      measurementId: "G-TJR0EHQLQN"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <script>
    let waitingForStart = true;
    let board, context;
    const boardWidth = 360, boardHeight = 640;
    const birdWidth = 34, birdHeight = 24;
    const birdX = boardWidth / 8, birdY = boardHeight / 2;
    let birdImg = new Image();
    let birdBlinkImg = new Image();
    let bird = { x: birdX, y: birdY, width: birdWidth, height: birdHeight };
    let pipeArray = [], pipeWidth = 64, pipeHeight = 512, pipeX = boardWidth, pipeY = 0;
    let topPipeImg = new Image(), bottomPipeImg = new Image();
    let velocityX = 0, velocityY = 0, gravity = 0.4;
    let gameOver = false, score = 0, paused = false, countdownActive = false;
    let muted = false;

    let highScore = localStorage.getItem("flappyHighScore") || 0;
    let lastBlinkTime = 0;
    let isBlinking = false;
    let playerName = prompt("Enter your name:")?.trim() || "Player";
    let bgm, sfxWing, sfxHit, sfxPoint, sfxSwooshing, sfxDie;
    let playerId = localStorage.getItem("flappyPlayerId");

    if (!playerId) {
      playerId = crypto.randomUUID();
      localStorage.setItem("flappyPlayerId", playerId);
    }

    async function showScoreboard() {
      const scoreboard = document.getElementById("scoreboard");
      scoreboard.style.display = "block";
      scoreboard.innerHTML = "Loading...";

      try {
        const snapshot = await db.collection("scores")
          .orderBy("score", "desc")
          .limit(10)
          .get();

        if (snapshot.empty) {
          scoreboard.innerHTML = "<h3>🏆 Leaderboard</h3><p>No scores yet</p>";
          return;
        }

        let html = "<h3>🏆 Leaderboard</h3>";
        let rank = 1;

        snapshot.forEach(doc => {
          const data = doc.data();
          html += `<p style="text-align:left; font-size:10px;">${rank}. ${data.name.substring(0,10)}: ${data.score}</p>`;
          rank++;
        });

        scoreboard.innerHTML = html;

      } catch (err) {
        scoreboard.innerHTML = "Error loading leaderboard";
        console.error(err);
      }
    }
    
    window.onload = () => {
      board = document.getElementById("board");
      board.width = boardWidth;
      board.height = boardHeight;
      context = board.getContext("2d");

      birdImg.src = "OpenEyes.png";
      birdBlinkImg.src = "ClosedEyes.png";
      topPipeImg.src = "toppipe.png";
      bottomPipeImg.src = "bottompipe.png";

      bgm = document.getElementById("bgm");
      sfxWing = document.getElementById("sfx_wing");
      sfxHit = document.getElementById("sfx_hit");
      sfxPoint = document.getElementById("sfx_point");
      sfxSwooshing = document.getElementById("sfx_swooshing");
      sfxDie = document.getElementById("sfx_die");

      document.getElementById("pauseBtn").onclick = togglePause;
      document.getElementById("gameTab").onclick = () => switchTab("game");
      document.getElementById("scoreboardTab").onclick = () => switchTab("scoreboard");

      document.addEventListener("keydown", moveBird);
      document.addEventListener("touchstart", moveBird);
      document.addEventListener("keydown", function(e) {
        if (gameOver && e.code === "KeyR") restartGame();
      });

      requestAnimationFrame(update);
      setInterval(placePipes, 1500);
    };

    function switchTab(tab) {
      const gameTab = document.getElementById("gameTab");
      const scoreTab = document.getElementById("scoreboardTab");
      const boardEl = document.getElementById("board");
      const scoreboard = document.getElementById("scoreboard");
      const pauseBtn = document.getElementById("pauseBtn");

      gameTab.classList.remove("active");
      scoreTab.classList.remove("active");

      if (tab === "game") {
        gameTab.classList.add("active");
        boardEl.style.display = "block";
        scoreboard.style.display = "none";
        pauseBtn.style.display = "block";
      } else {
        scoreTab.classList.add("active");
        boardEl.style.display = "none";
        pauseBtn.style.display = "none";
        showScoreboard(); // CALLING THE FUNCTION HERE
      }
    }

    function togglePause() {
      if (gameOver || waitingForStart || countdownActive) return;

      if (!paused) {
        paused = true;
        document.getElementById("pauseBtn").textContent = "Play";
      } else {
        countdownActive = true;
        document.getElementById("pauseBtn").textContent = "Pause";
        let countdown = 2;
        const countdownDiv = document.getElementById("countdown");
        countdownDiv.style.display = "block";
        countdownDiv.textContent = countdown;

        const interval = setInterval(() => {
          countdown--;
          countdownDiv.textContent = countdown;
          countdownDiv.style.animation = "none";
          void countdownDiv.offsetWidth; 
          countdownDiv.style.animation = "scaleFade 1s ease forwards";
          if (countdown <= 0) {
            clearInterval(interval);
            countdownDiv.style.display = "none";
            countdownActive = false;
            paused = false;
          }
        }, 1000);
      }
    }
    

    function update() {
      requestAnimationFrame(update);
      if (gameOver || paused) return;

      context.clearRect(0, 0, board.width, board.height);
      let now = Date.now();

      const blinkCycle = 4000;
      const blinkDuration = 200;

      let cycleTime = now % blinkCycle;
      isBlinking = cycleTime < blinkDuration;
      if (!waitingForStart) {
        velocityY += gravity;
        bird.y = Math.min(Math.max(bird.y + velocityY, 0), board.height - bird.height);
        velocityX = -2;
      } else {
        let floatAmplitude = 10;
        let floatFrequency = 0.005;
        bird.y = birdY + floatAmplitude * Math.sin(Date.now() * floatFrequency);
      }
      let currentBirdImg = isBlinking ? birdBlinkImg : birdImg;
      context.drawImage(currentBirdImg, bird.x, bird.y, bird.width, bird.height);
      if (!waitingForStart && bird.y + bird.height >= board.height) {
        handleGameOver();
        return;
      }

      for (let i = 0; i < pipeArray.length; i++) {
        let pipe = pipeArray[i];
        if (!waitingForStart) pipe.x += velocityX;
        context.drawImage(pipe.img, pipe.x, pipe.y, pipe.width, pipe.height);

        if (!pipe.passed && bird.x > pipe.x + pipe.width) {
          score += 0.5;
          pipe.passed = true;
          sfxPoint.play();
        }

        if (detectCollision(bird, pipe)) return handleGameOver();
      }

      pipeArray = pipeArray.filter(p => p.x > -pipeWidth);

      context.fillStyle = "white";
      context.font = "55px 'Press Start 2P', monospace";
      context.fillText(Math.floor(score), board.width / 2 - context.measureText(Math.floor(score)).width / 2, board.height / 4);
    }

    function placePipes() {
      if (gameOver || paused || waitingForStart) return;
      let randomY = pipeY - pipeHeight / 4 - Math.random() * (pipeHeight / 2);
      let opening = board.height / 4;

      pipeArray.push({ img: topPipeImg, x: pipeX, y: randomY, width: pipeWidth, height: pipeHeight, passed: false });
      pipeArray.push({ img: bottomPipeImg, x: pipeX, y: randomY + pipeHeight + opening, width: pipeWidth, height: pipeHeight, passed: false });
    }

    function moveBird(e) {
      if (gameOver || paused || countdownActive) return;
      if (e.type === "keydown" && !(e.code === "Space" || e.code === "ArrowUp")) return;

      if (waitingForStart) {
        waitingForStart = false;
        if (!muted) {
          bgm.currentTime = 0;
          bgm.play();
          sfxSwooshing.play();
        }
      }

      velocityY = -6;
      sfxWing.currentTime = 0;
      sfxWing.play();
    }

    function detectCollision(a, b) {
      return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function handleGameOver() {
      if (gameOver) return;
      gameOver = true;
      sfxHit.play();
      sfxDie.play();
      bgm.pause();
      
      let currentScore = Math.floor(score);
      document.getElementById("finalScore").textContent = currentScore;

      if (currentScore > highScore) {
        highScore = currentScore;
        localStorage.setItem("flappyHighScore", highScore);
      }

      document.getElementById("highScore").textContent = Math.floor(highScore);
      document.getElementById("gameOverModal").classList.add("show");
    }

    function restartGame() {
      document.getElementById("gameOverModal").classList.remove("show");
      bird.y = birdY;
      velocityY = 0;
      pipeArray = [];
      score = 0;
      gameOver = false;
      waitingForStart = true;
      velocityX = 0;
    }

    function shareScore() {
      const text = `${playerName} scored ${Math.floor(score)} in Flappy Bird! Can you beat that?`;
      if (navigator.share) {
        navigator.share({ title: "Flappy Bird Score", text });
      } else {
        alert("Share API not supported. Copy this message:\n\n" + text);
      }
    }

    async function addToScoreboard() {
      const name = prompt("Enter your name:", playerName)?.trim();
      if (!name) return;

      const playerScore = Math.floor(score);

      try {
        const docRef = db.collection("scores").doc(playerId);
        const docSnap = await docRef.get();

        if (docSnap.exists) {
          const existingScore = docSnap.data().score;

          if (playerScore > existingScore) {
            await docRef.update({
              score: playerScore,
              name: name,
              timestamp: Date.now()
            });
            alert("New high score updated! 🔥");
          } else {
            alert("Score not higher than your best.");
          }
        } else {
          await docRef.set({
            id: playerId,
            name: name,
            score: playerScore,
            timestamp: Date.now()
          });

          alert("Score added to leaderboard!");
        }

        switchTab("scoreboard");

      } catch (err) {
        alert("Error saving score: " + err.message);
        console.error(err);
      }
    }
  </script>
</body>
</html>
