<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>Flappy Bird Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Press Start 2P', monospace;
      margin: 0;
      overflow: hidden;
      background: #000 url("BG.jpeg") no-repeat center center fixed;
      background-size: cover;
      text-align: center;
      touch-action: manipulation;
    }

    .tabs {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 10;
      padding: 10px;
    }

    .tabs button {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      margin: 0 5px;
      padding: 8px;
      background: cyan;
      border: 2px solid black;
      border-radius: 8px;
      cursor: pointer;
    }

    .tabs button.active { background: gold; }

    #board {
      display: block;
      margin: 70px auto 10px auto;
      background: url("flappybirdbg.png") no-repeat center/cover;
      border-radius: 15px;
      border: 6px solid cyan;
      max-width: 95vw;
      max-height: 70vh;
    }

    #pauseBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      padding: 10px 20px;
      background: cyan;
      border: 3px solid black;
      font-family: 'Press Start 2P', monospace;
      border-radius: 10px;
      cursor: pointer;
      z-index: 5;
    }

    #scoreboard {
      display: none;
      color: white;
      font-size: 14px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.85);
      border: 3px solid gold;
      border-radius: 10px;
      width: 300px;
      margin: 100px auto;
      max-height: 60vh;
      overflow-y: auto;
    }

    #gameOverModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
    }

    #gameOverModal.show { display: block; }

    .popup {
      background-color: #f5deb3;
      border: 4px solid #000;
      padding: 20px;
      box-shadow: 5px 5px 0px #333;
    }

    .score-label { color: #ff6347; font-size: 10px; margin-bottom: 5px; }
    .score-value { color: #000; font-size: 28px; margin-bottom: 15px; }

    .pixel-btn {
      background-color: #b55220;
      border: 2px solid #fff;
      color: white;
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      padding: 12px;
      cursor: pointer;
      margin: 5px;
      width: 250px;
      display: block;
      box-shadow: 3px 3px 0 #000;
    }

    #countdown {
      font-size: 80px;
      color: white;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="tabs">
    <button id="gameTab" class="active" onclick="switchTab('game')">Game</button>
    <button id="scoreboardTab" onclick="switchTab('scoreboard')">Leaderboard</button>
  </div>

  <canvas id="board"></canvas>
  <button id="pauseBtn">Pause</button>

  <div id="scoreboard"></div>

  <div id="gameOverModal">
    <div class="popup">
      <div class="score-label">SCORE</div>
      <div id="finalScore" class="score-value">0</div>
      <div class="score-label">BEST</div>
      <div id="highScore" class="score-value">0</div>
      <div class="buttons">
        <button class="pixel-btn" onclick="restartGame()">RESTART</button>
        <button class="pixel-btn" onclick="addToScoreboard()">SAVE TO LEADERBOARD</button>
        <button class="pixel-btn" onclick="shareScore()">SHARE SCORE</button>
      </div>
    </div>
  </div>

  <div id="countdown"></div>

  <audio id="bgm" loop src="bgm_mario.mp3"></audio>
  <audio id="sfx_wing" src="sfx_wing.wav"></audio>
  <audio id="sfx_hit" src="sfx_hit.wav"></audio>
  <audio id="sfx_point" src="sfx_point.wav"></audio>
  <audio id="sfx_swooshing" src="sfx_swooshing.wav"></audio>
  <audio id="sfx_die" src="sfx_die.wav"></audio>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBAZs4Lwd-IgdV9y0d41PXMHyW1mll_PVY",
      authDomain: "flappybirdleaderboard-186ad.firebaseapp.com",
      projectId: "flappybirdleaderboard-186ad",
      storageBucket: "flappybirdleaderboard-186ad.firebasestorage.app",
      messagingSenderId: "623790359391",
      appId: "1:623790359391:web:f62feff43af41642a72cea"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const boardWidth = 360, boardHeight = 640;
    const birdWidth = 34, birdHeight = 24;
    let board, context;
    let bird = { x: boardWidth / 8, y: boardHeight / 2, width: birdWidth, height: birdHeight };
    let birdImg = new Image(), birdBlinkImg = new Image();
    let topPipeImg = new Image(), bottomPipeImg = new Image();
    let pipeArray = [];
    let pipeWidth = 64, pipeHeight = 512;
    let velocityX = -2, velocityY = 0, gravity = 0.4;
    let gameOver = false, score = 0, paused = false, countdownActive = false, waitingForStart = true;
    
    // LOAD HIGH SCORE FROM LOCAL STORAGE ON STARTUP
    let highScore = localStorage.getItem("flappyHighScore") || 0;

    window.onload = () => {
      board = document.getElementById("board");
      board.width = boardWidth; board.height = boardHeight;
      context = board.getContext("2d");

      birdImg.src = "OpenEyes.png";
      birdBlinkImg.src = "ClosedEyes.png";
      topPipeImg.src = "toppipe.png";
      bottomPipeImg.src = "bottompipe.png";

      document.getElementById("pauseBtn").onclick = togglePause;
      document.addEventListener("keydown", moveBird);
      board.addEventListener("touchstart", (e) => { e.preventDefault(); moveBird(e); });

      requestAnimationFrame(update);
      setInterval(placePipes, 1500);
    };

    function update() {
      requestAnimationFrame(update);
      if (gameOver || paused || countdownActive) return;

      context.clearRect(0, 0, board.width, board.height);

      if (!waitingForStart) {
        velocityY += gravity;
        bird.y = Math.max(bird.y + velocityY, 0);
      } else {
        bird.y = (boardHeight / 2) + Math.sin(Date.now() * 0.005) * 10;
      }

      let isBlinking = (Date.now() % 4000) < 200;
      context.drawImage(isBlinking ? birdBlinkImg : birdImg, bird.x, bird.y, bird.width, bird.height);

      if (bird.y + bird.height > boardHeight) handleGameOver();

      for (let i = 0; i < pipeArray.length; i++) {
        let pipe = pipeArray[i];
        if (!waitingForStart) pipe.x += velocityX;
        context.drawImage(pipe.img, pipe.x, pipe.y, pipe.width, pipe.height);

        if (!pipe.passed && bird.x > pipe.x + pipe.width) {
          score += 0.5; 
          pipe.passed = true;
          document.getElementById("sfx_point").play();
        }
        if (detectCollision(bird, pipe)) handleGameOver();
      }

      pipeArray = pipeArray.filter(p => p.x + pipeWidth > 0);

      context.fillStyle = "white";
      context.font = "30px 'Press Start 2P'";
      let sStr = Math.floor(score).toString();
      context.fillText(sStr, boardWidth/2 - context.measureText(sStr).width/2, 100);
    }

    function placePipes() {
      if (gameOver || paused || waitingForStart) return;
      let randomY = -pipeHeight/4 - Math.random() * (pipeHeight/2);
      let gap = 150;
      pipeArray.push({ img: topPipeImg, x: boardWidth, y: randomY, width: pipeWidth, height: pipeHeight, passed: false });
      pipeArray.push({ img: bottomPipeImg, x: boardWidth, y: randomY + pipeHeight + gap, width: pipeWidth, height: pipeHeight, passed: false });
    }

    function moveBird(e) {
      if (gameOver || paused || countdownActive) return;
      if (e.type === "keydown" && !(e.code === "Space" || e.code === "ArrowUp")) return;
      
      if (waitingForStart) {
        waitingForStart = false;
        document.getElementById("bgm").play();
      }
      velocityY = -6;
      let wing = document.getElementById("sfx_wing");
      wing.currentTime = 0; wing.play();
    }

    function detectCollision(a, b) {
      return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function handleGameOver() {
      if(gameOver) return;
      gameOver = true;
      document.getElementById("sfx_hit").play();
      document.getElementById("bgm").pause();

      // LOGIC TO SAVE HIGH SCORE
      let currentScore = Math.floor(score);
      if (currentScore > highScore) {
        highScore = currentScore;
        localStorage.setItem("flappyHighScore", highScore); // SAVE TO MEMORY
      }

      document.getElementById("finalScore").textContent = currentScore;
      document.getElementById("highScore").textContent = highScore;
      document.getElementById("gameOverModal").classList.add("show");
    }

    function restartGame() {
      bird.y = boardHeight / 2;
      pipeArray = [];
      score = 0;
      velocityY = 0;
      gameOver = false;
      waitingForStart = true;
      document.getElementById("gameOverModal").classList.remove("show");
    }

    function togglePause() {
      if (gameOver || waitingForStart) return;
      if (!paused) {
        paused = true;
        document.getElementById("pauseBtn").textContent = "Resume";
      } else {
        startCountdown();
      }
    }

    function startCountdown() {
      countdownActive = true;
      let count = 3;
      const cd = document.getElementById("countdown");
      cd.style.display = "block";
      cd.textContent = count;
      let timer = setInterval(() => {
        count--;
        if(count <= 0) {
          clearInterval(timer);
          cd.style.display = "none";
          countdownActive = false;
          paused = false;
          document.getElementById("pauseBtn").textContent = "Pause";
        } else cd.textContent = count;
      }, 1000);
    }

    async function addToScoreboard() {
      const name = prompt("Enter your name to save score:");
      if (!name) return;
      try {
        await db.collection("scores").add({
          name: name.trim(),
          score: Math.floor(score),
          timestamp: Date.now()
        });
        alert("Score Saved!");
        switchTab('scoreboard');
      } catch (e) { alert("Failed to save!"); }
    }

    async function switchTab(tab) {
      const b = document.getElementById("board");
      const s = document.getElementById("scoreboard");
      document.getElementById("gameTab").classList.toggle("active", tab === 'game');
      document.getElementById("scoreboardTab").classList.toggle("active", tab === 'scoreboard');

      if (tab === 'game') {
        b.style.display = "block";
        s.style.display = "none";
      } else {
        b.style.display = "none";
        s.style.display = "block";
        paused = true;
        const snap = await db.collection("scores").orderBy("score", "desc").limit(10).get();
        let html = "<h3>TOP 10 SCORES</h3><hr>";
        snap.forEach((doc, idx) => {
          html += `<p>${idx+1}. ${doc.data().name.toUpperCase()}: ${doc.data().score}</p>`;
        });
        s.innerHTML = html || "<p>No scores yet</p>";
      }
    }

    function shareScore() {
      const msg = `I scored ${Math.floor(score)} on Flappy Bird! Best: ${highScore}. Beat me!`;
      if (navigator.share) navigator.share({ title: 'Flappy Bird', text: msg });
      else alert("Copy this: " + msg);
    }
  </script>
</body>
</html>
