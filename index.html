<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flappy Bird Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Press Start 2P', monospace;
      margin: 0;
      overflow: hidden;
      background: #000 url("BG.jpeg") no-repeat center center fixed;
      background-size: cover;
      text-align: center;
    }

    /* Tab Styling */
    .tabs {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 10;
      padding: 10px;
    }

    .tabs button {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      margin: 0 10px;
      padding: 5px 10px;
      background: cyan;
      border: 2px solid black;
      border-radius: 10px;
      cursor: pointer;
    }

    .tabs button.active { background: gold; }

    #board {
      display: block;
      margin: 80px auto 20px auto;
      background: url("flappybirdbg.png") no-repeat center/cover;
      border-radius: 20px;
      border: 10px solid cyan;
      max-width: 90vw;
      max-height: 80vh;
    }

    #pauseBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      padding: 10px 20px;
      background: cyan;
      border: 2px solid black;
      font-family: 'Press Start 2P', monospace;
      border-radius: 10px;
      cursor: pointer;
      z-index: 5;
    }

    #scoreboard {
      display: none;
      color: white;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.85);
      border: 3px solid gold;
      border-radius: 10px;
      width: 320px;
      margin: 100px auto;
    }

    /* Modals */
    #gameOverModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      text-align: center;
    }

    #gameOverModal.show { display: block; }

    .popup {
      background-color: #f5deb3;
      border: 4px solid #000;
      padding: 20px;
      margin-bottom: 20px;
    }

    .score-label { color: #ff6347; font-size: 10px; margin: 10px 0 5px; }
    .score-value { color: #000; font-size: 32px; margin-bottom: 10px; }

    .pixel-btn {
      background-color: #b55220;
      border: 2px solid #fff;
      color: white;
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      padding: 12px;
      cursor: pointer;
      margin: 5px;
      width: 260px;
      box-shadow: 3px 3px 0 #000;
    }

    #countdown {
      font-size: 96px;
      color: white;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 100;
      animation: scaleFade 1s ease forwards;
    }

    @keyframes scaleFade {
      0% { transform: translate(-50%, -50%) scale(2); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    /* Auth Styles */
    .auth-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
    }
    .auth-modal {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      color: white;
      padding: 30px;
      border: 4px solid cyan;
      z-index: 2001;
      width: 280px;
      text-align: center;
    }
    .auth-modal input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    .auth-modal button { width: 100%; padding: 10px; background: cyan; border: none; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; }
    .auth-modal p { font-size: 10px; color: gold; cursor: pointer; text-decoration: underline; margin-top: 15px; }
    .hidden { display: none; }
    #authBtn { position: fixed; top: 15px; right: 15px; z-index: 100; padding: 5px; font-size: 8px; font-family: 'Press Start 2P'; cursor: pointer;}
  </style>
</head>
<body>

  <div class="tabs">
    <button id="gameTab" class="active" onclick="switchTab('game')">Game</button>
    <button id="scoreboardTab" onclick="switchTab('scoreboard')">Leaderboard</button>
  </div>

  <button id="authBtn" onclick="handleAuthAction()">Login</button>

  <canvas id="board"></canvas>
  <button id="pauseBtn">Pause</button>

  <div id="scoreboard"></div>

  <div id="gameOverModal">
    <div class="popup">
      <div class="score-label">SCORE</div>
      <div id="finalScore" class="score-value">0</div>
      <div class="score-label">BEST</div>
      <div id="highScore" class="score-value">0</div>
    </div>
    <div class="buttons">
      <button class="pixel-btn" onclick="restartGame()">RESTART</button>
      <button class="pixel-btn" onclick="addToScoreboard()">ADD TO LEADERBOARD</button>
      <button class="pixel-btn" onclick="shareScore()">SHARE</button>
    </div>
  </div>

  <div id="countdown"></div>

  <div id="authOverlay" class="auth-overlay hidden">
    <div id="loginModal" class="auth-modal hidden">
      <h2>Login</h2>
      <input id="loginUsername" placeholder="Username" />
      <input id="loginPassword" type="password" placeholder="Password" />
      <button onclick="handleLogin()">Login</button>
      <p onclick="openRegister()">Need an account? Register</p>
    </div>

    <div id="registerModal" class="auth-modal hidden">
      <h2>Register</h2>
      <input id="registerUsername" placeholder="Username" />
      <input id="registerPassword" type="password" placeholder="Password" />
      <button onclick="handleRegister()">Register</button>
      <p onclick="openLogin()">Have an account? Login</p>
    </div>
  </div>

  <audio id="bgm" loop src="bgm_mario.mp3"></audio>
  <audio id="sfx_wing" src="sfx_wing.wav"></audio>
  <audio id="sfx_hit" src="sfx_hit.wav"></audio>
  <audio id="sfx_point" src="sfx_point.wav"></audio>
  <audio id="sfx_swooshing" src="sfx_swooshing.wav"></audio>
  <audio id="sfx_die" src="sfx_die.wav"></audio>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    // 1. Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBAZs4Lwd-IgdV9y0d41PXMHyW1mll_PVY",
      authDomain: "flappybirdleaderboard-186ad.firebaseapp.com",
      projectId: "flappybirdleaderboard-186ad",
      storageBucket: "flappybirdleaderboard-186ad.firebasestorage.app",
      messagingSenderId: "623790359391",
      appId: "1:623790359391:web:f62feff43af41642a72cea"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // 2. Global Variables
    let board, context;
    const boardWidth = 360, boardHeight = 640;
    const birdWidth = 34, birdHeight = 24;
    let bird = { x: boardWidth / 8, y: boardHeight / 2, width: birdWidth, height: birdHeight };
    
    let birdImg = new Image(), birdBlinkImg = new Image();
    let topPipeImg = new Image(), bottomPipeImg = new Image();
    
    let pipeArray = [];
    let pipeWidth = 64, pipeHeight = 512;
    let velocityX = -2, velocityY = 0, gravity = 0.4;
    
    let gameOver = false, score = 0, paused = false, countdownActive = false, waitingForStart = true;
    let highScore = localStorage.getItem("highScore") || 0;
    let currentUser = null, currentUsername = null;

    // 3. Game Initialization
    window.onload = () => {
      board = document.getElementById("board");
      board.width = boardWidth; board.height = boardHeight;
      context = board.getContext("2d");

      birdImg.src = "OpenEyes.png";
      birdBlinkImg.src = "ClosedEyes.png";
      topPipeImg.src = "toppipe.png";
      bottomPipeImg.src = "bottompipe.png";

      document.getElementById("pauseBtn").onclick = togglePause;
      document.addEventListener("keydown", moveBird);
      board.addEventListener("touchstart", (e) => { e.preventDefault(); moveBird(e); });

      requestAnimationFrame(update);
      setInterval(placePipes, 1500);
    };

    // 4. Auth Logic
    auth.onAuthStateChanged(async (user) => {
      const authBtn = document.getElementById("authBtn");
      if (user) {
        currentUser = user;
        const doc = await db.collection("users").doc(user.uid).get();
        currentUsername = doc.exists ? doc.data().username : "Player";
        authBtn.textContent = "Logout (" + currentUsername + ")";
        closeAuth();
      } else {
        currentUser = null;
        currentUsername = null;
        authBtn.textContent = "Login";
        openLogin();
      }
    });

    async function handleLogin() {
      const u = document.getElementById("loginUsername").value.trim().toLowerCase();
      const p = document.getElementById("loginPassword").value;
      if(!u || !p) return alert("Fill all fields");
      try {
        await auth.signInWithEmailAndPassword(u + "@game.local", p);
      } catch (e) { alert("Login failed: " + e.message); }
    }

    async function handleRegister() {
      const u = document.getElementById("registerUsername").value.trim().toLowerCase();
      const p = document.getElementById("registerPassword").value;
      if(!u || p.length < 6) return alert("Username required & Password min 6 chars");
      
      try {
        const snap = await db.collection("users").where("username", "==", u).get();
        if(!snap.empty) return alert("Username taken");
        
        const res = await auth.createUserWithEmailAndPassword(u + "@game.local", p);
        await db.collection("users").doc(res.user.uid).set({ username: u, createdAt: Date.now() });
      } catch (e) { alert("Registration failed"); }
    }

    function handleAuthAction() {
      if(currentUser) auth.signOut();
      else openLogin();
    }

    function openLogin() { 
      document.getElementById("authOverlay").classList.remove("hidden");
      document.getElementById("loginModal").classList.remove("hidden");
      document.getElementById("registerModal").classList.add("hidden");
    }
    function openRegister() {
      document.getElementById("registerModal").classList.remove("hidden");
      document.getElementById("loginModal").classList.add("hidden");
    }
    function closeAuth() { document.getElementById("authOverlay").classList.add("hidden"); }

    // 5. Game Loop & Logic
    function update() {
      requestAnimationFrame(update);
      if (gameOver || paused || countdownActive) return;

      context.clearRect(0, 0, board.width, board.height);

      if (!waitingForStart) {
        velocityY += gravity;
        bird.y = Math.max(bird.y + velocityY, 0);
      } else {
        bird.y = (boardHeight / 2) + Math.sin(Date.now() * 0.005) * 10;
      }

      // Blink effect
      let isBlinking = (Date.now() % 4000) < 200;
      context.drawImage(isBlinking ? birdBlinkImg : birdImg, bird.x, bird.y, bird.width, bird.height);

      if (bird.y + bird.height > boardHeight) return handleGameOver();

      for (let i = 0; i < pipeArray.length; i++) {
        let pipe = pipeArray[i];
        if (!waitingForStart) pipe.x += velocityX;
        context.drawImage(pipe.img, pipe.x, pipe.y, pipe.width, pipe.height);

        if (!pipe.passed && bird.x > pipe.x + pipe.width) {
          score += 0.5; // Two pipes (top/bottom) per gap
          pipe.passed = true;
          document.getElementById("sfx_point").play();
        }
        if (detectCollision(bird, pipe)) return handleGameOver();
      }

      pipeArray = pipeArray.filter(p => p.x + pipeWidth > 0);

      context.fillStyle = "white";
      context.font = "40px 'Press Start 2P'";
      let scoreText = Math.floor(score).toString();
      context.fillText(scoreText, boardWidth/2 - context.measureText(scoreText).width/2, 150);
    }

    function placePipes() {
      if (gameOver || paused || waitingForStart) return;
      let randomY = -pipeHeight/4 - Math.random() * (pipeHeight/2);
      let gap = 160;
      pipeArray.push({ img: topPipeImg, x: boardWidth, y: randomY, width: pipeWidth, height: pipeHeight, passed: false });
      pipeArray.push({ img: bottomPipeImg, x: boardWidth, y: randomY + pipeHeight + gap, width: pipeWidth, height: pipeHeight, passed: false });
    }

    function moveBird(e) {
      if (gameOver || paused || countdownActive) return;
      if (waitingForStart) {
        waitingForStart = false;
        document.getElementById("bgm").play();
      }
      velocityY = -7;
      let sfx = document.getElementById("sfx_wing");
      sfx.currentTime = 0; sfx.play();
    }

    function detectCollision(a, b) {
      return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function handleGameOver() {
      gameOver = true;
      document.getElementById("sfx_hit").play();
      document.getElementById("bgm").pause();
      if (score > highScore) {
        highScore = Math.floor(score);
        localStorage.setItem("highScore", highScore);
      }
      document.getElementById("finalScore").textContent = Math.floor(score);
      document.getElementById("highScore").textContent = highScore;
      document.getElementById("gameOverModal").classList.add("show");
    }

    function restartGame() {
      bird.y = boardHeight / 2;
      pipeArray = [];
      score = 0;
      velocityY = 0;
      gameOver = false;
      waitingForStart = true;
      document.getElementById("gameOverModal").classList.remove("show");
    }

    function togglePause() {
      if (gameOver || waitingForStart) return;
      if (!paused) {
        paused = true;
        document.getElementById("pauseBtn").textContent = "Resume";
      } else {
        startCountdown();
      }
    }

    function startCountdown() {
      countdownActive = true;
      let count = 3;
      const cdDiv = document.getElementById("countdown");
      cdDiv.style.display = "block";
      cdDiv.textContent = count;
      
      let timer = setInterval(() => {
        count--;
        if(count <= 0) {
          clearInterval(timer);
          cdDiv.style.display = "none";
          countdownActive = false;
          paused = false;
          document.getElementById("pauseBtn").textContent = "Pause";
        } else {
          cdDiv.textContent = count;
        }
      }, 1000);
    }

    // 6. Leaderboard Logic
    async function addToScoreboard() {
      if (!currentUser) return alert("Login to save scores!");
      try {
        await db.collection("scores").add({
          name: currentUsername,
          score: Math.floor(score),
          timestamp: Date.now()
        });
        alert("Score saved!");
        switchTab('scoreboard');
      } catch (e) { alert("Error saving score"); }
    }

    async function switchTab(tab) {
      const boardEl = document.getElementById("board");
      const scoreEl = document.getElementById("scoreboard");
      document.getElementById("gameTab").classList.toggle("active", tab === 'game');
      document.getElementById("scoreboardTab").classList.toggle("active", tab === 'scoreboard');

      if (tab === 'game') {
        boardEl.style.display = "block";
        scoreEl.style.display = "none";
      } else {
        boardEl.style.display = "none";
        scoreEl.style.display = "block";
        paused = true; // Pause game while viewing leaderboard
        
        const snap = await db.collection("scores").orderBy("score", "desc").limit(10).get();
        let html = "<h3>TOP 10 GHOSTS</h3><hr>";
        let i = 1;
        snap.forEach(doc => {
          html += `<p>${i++}. ${doc.data().name}: ${doc.data().score}</p>`;
        });
        scoreEl.innerHTML = html || "<p>No scores yet!</p>";
      }
    }

    function shareScore() {
      const text = `I just scored ${Math.floor(score)} points in Flappy Bird!`;
      if (navigator.share) navigator.share({ title: 'Flappy Bird', text: text });
      else alert(text);
    }
  </script>
</body>
</html>
